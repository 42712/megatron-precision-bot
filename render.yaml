services:
  - type: web
    name: megatron-precision-bot
    env: python
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: python main.py
    plan: free
    envVars:
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_SECRET_KEY
        sync: false
      - key: MODO_TESTE
        value: "False"
      - key: SALDO_INICIAL
        value: "15.0"
      - key: PERCENTUAL_POR_OPERACAO
        value: "0.20"
      - key: TAKE_PROFIT_PCT
        value: "0.05"
      - key: STOP_LOSS_PCT
        value: "0.02"
      - key: TRAILING_STOP_PCT
        value: "0.015"
      - key: MAX_POSICOES
        value: "2"
      - key: MAX_PERDA_DIARIA_PCT
        value: "0.15"
      - key: SALDO_MINIMO_PCT
        value: "0.30"
      - key: COOLDOWN_APOS_STOP
        value: "10"
      - key: MIN_CONFLUENCIA
        value: "4"
      - key: MIN_INTERVALO
        value: "0.5"
      - key: DELAY_ENTRE_PARES
        value: "2.0"
      - key: PYTHON_VERSION
        value: "3.11.8"
