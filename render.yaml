services:
  - type: worker
    name: megatron-precision-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: BINANCE_API_KEY
        sync: false
      - key: BINANCE_SECRET_KEY
        sync: false
      - key: MODO_TESTE
        value: "True"
      - key: VALOR_COMPRA
        value: "50.0"
      - key: TAKE_PROFIT
        value: "1.05"
      - key: STOP_LOSS
        value: "0.98"
      - key: SALDO_INICIAL
        value: "100.0"
      - key: MIN_INTERVALO
        value: "0.5"
      - key: DELAY_ENTRE_PARES
        value: "2.0"